<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Start Your Journey — FraVeRa Journey</title>
  <meta name="description" content="Fill out the form to start your regeneration journey. Free, non-binding consultation.">
  <link rel="canonical" href="https://fravera-journey.com/en/journey-form.html">
  <link rel="icon" type="image/png" href="/assets/img/ogolne/favicon.webp">
  <link rel="stylesheet" href="/assets/css/styles.css">
</head>
<body>
  <div id="header-placeholder"></div>

  <main style="padding-top: 100px;">
    <section class="section">
      <div class="container container-narrow">
        <div class="section-header">
          <span class="section-label">Contact Form</span>
          <h1 class="section-title">Start Your <strong>Journey</strong></h1>
          <p class="section-desc">
            Fill out the form below so we can prepare a personalized offer.
            We respond within 48 hours.
          </p>
        </div>

        <form action="https://usebasin.com/f/ce989cfdc5d2" method="POST" data-validate class="form-container" style="background: var(--color-bg-light); padding: var(--space-lg); border-radius: var(--radius-lg);">
          <div class="honeypot">
            <label for="website">Website</label>
            <input type="text" id="website" name="website" tabindex="-1" autocomplete="off">
          </div>
          <input type="hidden" name="timestamp" value="">
          <script>document.querySelector('input[name="timestamp"]').value = Date.now();</script>

          <div class="form-row">
            <div class="form-group">
              <label for="firstName" class="form-label">First Name <span class="required">*</span></label>
              <input type="text" id="firstName" name="firstName" class="form-input" required placeholder="Your first name">
            </div>
            <div class="form-group">
              <label for="lastName" class="form-label">Last Name <span class="required">*</span></label>
              <input type="text" id="lastName" name="lastName" class="form-input" required placeholder="Your last name">
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="email" class="form-label">Email <span class="required">*</span></label>
              <input type="email" id="email" name="email" class="form-input" required placeholder="your@email.com">
            </div>
            <div class="form-group">
              <label for="phone" class="form-label">Phone</label>
              <input type="tel" id="phone" name="phone" class="form-input" placeholder="+31 6 1234 5678">
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="country" class="form-label">Country of Residence <span class="required">*</span></label>
              <select id="country" name="country" class="form-select" required>
                <option value="">Select country</option>
                <option value="nl">Netherlands</option>
                <option value="be">Belgium</option>
                <option value="de">Germany</option>
                <option value="uk">United Kingdom</option>
                <option value="other">Other</option>
              </select>
            </div>
            <div class="form-group">
              <label for="serviceLevel" class="form-label">Service Level</label>
              <select id="serviceLevel" name="serviceLevel" class="form-select">
                <option value="">Select level</option>
                <option value="basic">Basic (€90-120)</option>
                <option value="comfort">Comfort (€210-270)</option>
                <option value="premium">Premium (€350-440)</option>
                <option value="not-sure">Not sure, need advice</option>
              </select>
            </div>
          </div>

          <div class="form-group">
            <label for="healthNeeds" class="form-label">Health Needs / Preferences</label>
            <textarea id="healthNeeds" name="healthNeeds" class="form-textarea" placeholder="Briefly describe your health needs (e.g., back problems, respiratory system, recovery after illness) or stay preferences..."></textarea>
            <p class="form-hint">This information will help us match the best facility for you.</p>
          </div>

          <div class="form-group">
            <label for="message" class="form-label">Additional Information</label>
            <textarea id="message" name="message" class="form-textarea" placeholder="Any additional questions or requirements?"></textarea>
          </div>

          <div class="form-group">
            <label class="form-check">
              <input type="checkbox" name="consent" class="form-check-input" required>
              <span class="form-check-label">
                I consent to the processing of my personal data for the purpose of preparing an offer. 
                I have read the <a href="/en/privacy.html" target="_blank">Privacy Policy</a>.
                <span class="required">*</span>
              </span>
            </label>
          </div>

          <div class="form-group" style="margin-top: var(--space-lg);">
            <button type="submit" class="btn btn-primary" style="width: 100%;">Send Inquiry</button>
            <p class="form-hint text-center" style="margin-top: var(--space-sm);">We respond within 48 hours. Your data is secure.</p>
          </div>
        </form>
      </div>
    </section>
  </main>

  <div id="footer-placeholder"></div>
  <script src="/assets/js/includes.js"></script>
  <script src="/assets/js/app.js"></script>
</body>
</html>
